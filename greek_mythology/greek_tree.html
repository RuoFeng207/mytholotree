<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greek Mythology Graph</title>

    <script src="https://unpkg.com/cytoscape/dist/cytoscape.min.js"></script>
    <script src="https://unpkg.com/layout-base/layout-base.js"></script>
    <script src="https://unpkg.com/cose-base/cose-base.js"></script>
    <script src="https://unpkg.com/cytoscape-fcose/cytoscape-fcose.js"></script>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="../main.css">
    <link rel="stylesheet" href="../responsive.css">
</head>

<body>
    <div id="navbar"></div>
    <div class="legend">
        <strong>Legend</strong><br>

        <div class="item">
            <span class="dot parent"></span> Parent
        </div>

        <div class="item">
            <span class="dot spouse"></span> Spouse
        </div>

        <div class="item">
            <span class="dot procreation"></span> Procreation
        </div>

        <div class="item">
            <span class="dot affair"></span> Affair
        </div>
    </div>
    
    <select id="authorSelect">
        <option value="all">All</option>
        <option value="hesiod">Hesiod</option>
        <option value="Hyginus">Hyginus</option>
        <option value="Cicero ">Cicero </option>
        <option value="test">Test</option>
    </select>

    <div id="cy"></div>

    <div id="footer"></div>

    <script type="module" src="./js/greek_tree.js"></script>
    <script type="module" src="../filters/family-filter.js"></script>
    <script src="../filters/author-filter.js"></script>
    <script src="../main.js"></script>
</body>

</html>
