<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greek Mythology Graph</title>

    <script src="https://unpkg.com/cytoscape/dist/cytoscape.min.js"></script>
    <script src="https://unpkg.com/layout-base/layout-base.js"></script>
    <script src="https://unpkg.com/cose-base/cose-base.js"></script>
    <script src="https://unpkg.com/cytoscape-fcose/cytoscape-fcose.js"></script>

    <link rel="stylesheet" href="css/graph.css">
    <link rel="stylesheet" href="../main.css">
    <link rel="stylesheet" href="../responsive.css">
</head>

<body>
    <div id="navbar"></div>
    <main>
        <div class="legend">
            <strong>Legend</strong><br>

            <div class="item">
                <span class="dot parent"></span> Parent
            </div>

            <div class="item">
                <span class="dot spouse"></span> Spouse
            </div>

            <div class="item">
                <span class="dot procreation"></span> Procreation
            </div>

            <div class="item">
                <span class="dot affair"></span> Affair
            </div>
        </div>

        <div class="author-picker">
            <input id="authorSearch" placeholder="Search author...">
            <div id="authorDropdown"></div>
        </div>
        <div class="node-picker">
            <input id="nodeSearch" placeholder="Search node...">
            <div id="nodeDropdown"></div>
        </div>
    </main>

    <div id="cy"></div>

    <div id="footer"></div>

    <script type="module" src="./js/greek_tree.js"></script>
    <script type="module" src="../filters/family-filter.js"></script>
    <script type="module" src="../filters/author-filter.js"></script>
    <script type="module" src="../filters/node-search.js"></script>
    <script src="../main.js"></script>
</body>

</html>
